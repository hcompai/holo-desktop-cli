name: Holo Live Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write

jobs:
  calculator:
    name: calculator (${{ matrix.os }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
          - os: windows-latest
          - os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      AWS_REGION: us-west-2
      HAI_API_KEY_SECRET_ID: ${{ vars.HAI_API_KEY_SECRET_ID }}
      HAI_API_KEY_SECRET_FIELD: github-actions
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Linux desktop
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-linux-desktop

      - name: Log GitHub OIDC claims
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com');
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString('utf8'));
            for (const claim of ['iss', 'aud', 'sub', 'repository', 'repository_owner', 'ref', 'workflow_ref', 'job_workflow_ref']) {
              core.info(`oidc ${claim}: ${payload[claim] ?? '<unset>'}`);
            }
            core.info(`github event_name: ${context.eventName}`);
            core.info(`github ref: ${context.ref}`);
            core.info(`github head_ref: ${context.payload.pull_request?.head?.ref ?? '<unset>'}`);
            core.info(`github base_ref: ${context.payload.pull_request?.base?.ref ?? '<unset>'}`);

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Fetch HAI API key
        if: runner.os != 'Windows'
        id: fetch-hai-api-key
        shell: bash
        run: |
          set -euo pipefail

          secret_string="$(aws secretsmanager get-secret-value \
            --secret-id "$HAI_API_KEY_SECRET_ID" \
            --query SecretString \
            --output text)"

          hai_api_key="$(
            SECRET_STRING="$secret_string" python - <<'PY'
          import json
          import os
          import sys

          field = os.environ.get("HAI_API_KEY_SECRET_FIELD", "").strip()
          secret = os.environ["SECRET_STRING"]
          try:
              parsed = json.loads(secret)
          except json.JSONDecodeError:
              parsed = secret

          if isinstance(parsed, dict):
              print(f"Secrets Manager fields: {', '.join(sorted(parsed))}", file=sys.stderr)
              if field:
                  value = parsed.get(field) or ""
                  print(f"Selected HAI API key field: {field}", file=sys.stderr)
              else:
                  value = parsed.get("HAI_API_KEY") or parsed.get("github-actions") or parsed.get("internal") or ""
                  print("Selected HAI API key field by fallback order", file=sys.stderr)
          else:
              value = str(parsed)
              print("Secrets Manager value is not JSON; using raw secret string", file=sys.stderr)

          value = value.strip()
          if not value:
              selected = field or "HAI_API_KEY/github-actions/internal"
              sys.exit(f"Secrets Manager value did not contain `{selected}`")
          print(f"Selected HAI API key length: {len(value)}", file=sys.stderr)
          print(value)
          PY
          )"

          echo "::add-mask::$hai_api_key"
          echo "hai-api-key=$hai_api_key" >> "$GITHUB_OUTPUT"

      - name: Fetch HAI API key
        if: runner.os == 'Windows'
        id: fetch-hai-api-key-windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $secretString = aws secretsmanager get-secret-value `
            --secret-id "$env:HAI_API_KEY_SECRET_ID" `
            --query SecretString `
            --output text

          $field = "$env:HAI_API_KEY_SECRET_FIELD".Trim()
          $value = ""

          try {
            $parsed = $secretString | ConvertFrom-Json -ErrorAction Stop
          } catch {
            $parsed = $null
          }

          if ($null -ne $parsed) {
            $fields = @($parsed.PSObject.Properties.Name | Sort-Object)
            Write-Host "Secrets Manager fields: $($fields -join ', ')"

            if ($field) {
              $property = $parsed.PSObject.Properties[$field]
              if ($null -ne $property) {
                $value = [string]$property.Value
              }
              Write-Host "Selected HAI API key field: $field"
            } else {
              foreach ($candidate in @("HAI_API_KEY", "github-actions", "internal")) {
                $property = $parsed.PSObject.Properties[$candidate]
                if ($null -ne $property -and "$($property.Value)".Trim()) {
                  $value = [string]$property.Value
                  break
                }
              }
              Write-Host "Selected HAI API key field by fallback order"
            }
          } else {
            $value = $secretString
            Write-Host "Secrets Manager value is not JSON; using raw secret string"
          }

          $value = "$value".Trim()
          if (-not $value) {
            $selected = if ($field) { $field } else { "HAI_API_KEY/github-actions/internal" }
            throw "Secrets Manager value did not contain $selected"
          }

          Write-Host "Selected HAI API key length: $($value.Length)"
          Write-Output "::add-mask::$value"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "hai-api-key=$value"

      - name: Probe HAI API key entitlement
        shell: bash
        env:
          HAI_API_KEY: ${{ steps.fetch-hai-api-key.outputs.hai-api-key }}${{ steps.fetch-hai-api-key-windows.outputs.hai-api-key }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          import sys
          import urllib.error
          import urllib.request

          key = os.environ.get("HAI_API_KEY", "").strip()
          if not key:
              sys.exit("HAI_API_KEY was not exported")

          url = os.environ.get("HAI_BASE_URL", "").strip() or "https://api.hcompany.ai/v1/models"
          request = urllib.request.Request(url, headers={"Authorization": f"Bearer {key}"})

          try:
              with urllib.request.urlopen(request, timeout=10) as response:
                  status = response.status
          except urllib.error.HTTPError as exc:
              status = exc.code
          except Exception as exc:
              print(f"Gateway probe could not verify key: {type(exc).__name__}", file=sys.stderr)
              raise

          print(f"Gateway entitlement probe status: {status}")
          if status in (401, 403):
              sys.exit("HAI API key is present but the gateway rejected it")
          if status != 200:
              sys.exit(f"HAI API key entitlement probe returned unexpected status {status}")
          PY

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install Linux candidate through shell installer
        if: runner.os == 'Linux'
        shell: bash
        env:
          HOLO_HOME: ${{ runner.temp }}/holo-installer-smoke
          HOLO_INSTALL_MANIFEST_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/install/manifest.json
          HOLO_INSTALL_PACKAGE: ${{ github.workspace }}
          HOLO_INSTALL_SKIP_PATH: "1"
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          curl -fsSL "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/install/install.sh" | bash
          "$HOLO_HOME/bin/holo" --help

      - name: Run calculator live smoke
        id: run-calculator-live-smoke
        shell: bash
        env:
          HAI_API_KEY: ${{ steps.fetch-hai-api-key.outputs.hai-api-key }}${{ steps.fetch-hai-api-key-windows.outputs.hai-api-key }}
        run: |
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "::group::Calculator live smoke attempt ${attempt}/${max_attempts}"
            if uv run pytest tests/e2e/test_live_foreground.py \
              --run-holo-live-foreground \
              --holo-live-task-ids calculator_ci_smoke \
              --holo-live-timeout 180 \
              --capture=tee-sys \
              -q; then
              echo "::endgroup::"
              echo "Calculator live smoke passed on attempt ${attempt}"
              exit 0
            fi
            echo "::endgroup::"
            echo "Calculator live smoke failed on attempt ${attempt}/${max_attempts}"
          done
          echo "Calculator live smoke failed after ${max_attempts} attempts" >&2
          exit 1

      - name: Render smoke report
        if: always() && steps.run-calculator-live-smoke.outcome != 'skipped'
        shell: bash
        run: |
          rm -rf "$HOME/.holo/e2e-review"
          uv run python -m tests.e2e._smoke_report \
            --github-step-summary "$GITHUB_STEP_SUMMARY"

      - name: Check smoke review artifact redactions
        id: check-smoke-review-artifact-redactions
        if: always() && steps.run-calculator-live-smoke.outcome != 'skipped'
        shell: bash
        run: |
          set -euo pipefail

          review_dir="$HOME/.holo/e2e-review"
          test -d "$review_dir"
          if grep -R -I -q -E 'HAI_API_KEY[[:space:]]*[=:][[:space:]]*[^[:space:]]{20,}|Authorization:[[:space:]]*Bearer[[:space:]]+[A-Za-z0-9._~+/-]{20,}|Bearer[[:space:]]+hk-[A-Za-z0-9._~+/-]{20,}|hk-[A-Za-z0-9._~+/-]{20,}' "$review_dir"; then
            echo "Potential secret material found in smoke review artifact" >&2
            exit 1
          fi

      - name: Upload smoke artifacts
        if: always() && steps.run-calculator-live-smoke.outcome != 'skipped' && steps.check-smoke-review-artifact-redactions.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: holo-live-smoke-${{ runner.os }}
          path: ~/.holo/e2e-review/
          if-no-files-found: error

      - name: Upload Linux desktop logs
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: holo-live-smoke-Linux-desktop-logs
          path: ${{ runner.temp }}/holo-linux-desktop-logs/
          if-no-files-found: warn
