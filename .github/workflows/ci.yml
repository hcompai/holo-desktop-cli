name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows-arm64-installer:
    name: fresh Windows ARM64 installer
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.18"
          enable-cache: true
      - id: dependency
        name: Build the distributable Windows ARM64 dependency
        shell: pwsh
        run: |
          $root = "$env:RUNNER_TEMP\windows-arm64-installer-candidate"
          .\scripts\build_windows_arm64_dependency_wheel.ps1 `
            -WheelDirectory "$root\dependencies" `
            -ManifestOutput "$root\install\manifest.json" `
            -WheelBaseUrl "$root\dependencies"
      - id: client
        name: Build the Holo wheel consumed by a customer install
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $output = "$env:RUNNER_TEMP\windows-arm64-installer-candidate\holo"
          uv build --wheel --out-dir $output
          if ($LASTEXITCODE -ne 0) {
            throw "failed to build the Holo wheel"
          }
          $wheels = @(Get-ChildItem -Path $output -Filter "holo_desktop_cli-*.whl")
          if ($wheels.Count -ne 1) {
            throw "expected exactly one Holo wheel, found $($wheels.Count)"
          }
          "wheel_path=$($wheels[0].FullName)" >> $env:GITHUB_OUTPUT
      - name: Install from the pull request checkout
        shell: pwsh
        env:
          HOLO_HOME: ${{ runner.temp }}\holo-installer-smoke
          HOLO_INSTALL_MANIFEST_URL: ${{ steps.dependency.outputs.manifest_path }}
          HOLO_INSTALL_PACKAGE: ${{ steps.client.outputs.wheel_path }}
          UV_NO_BUILD: "1"
        run: |
          $ErrorActionPreference = "Stop"
          $runtimeSha = ((Get-Content shas/windows-arm64.txt).Trim() -split "=", 2)[1]
          if ($runtimeSha -match "^0{64}$") {
            $env:HOLO_INSTALL_SKIP_RUN_SETUP = "1"
            Write-Host "Runtime artifact is pending; validating the native CLI installer only."
          }

          & .\install\install.ps1
          & "$env:HOLO_HOME\bin\holo.exe" --help

          if ($runtimeSha -notmatch "^0{64}$") {
            $runtime = Get-ChildItem "$HOME\.holo\runtime\*\hai-agent-runtime.exe" | Select-Object -First 1
            if ($null -eq $runtime) {
              throw "installer completed without a managed Windows ARM64 runtime"
            }
          }
      - name: Upload the exact installer candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-installer-candidate
          path: ${{ runner.temp }}/windows-arm64-installer-candidate/
          if-no-files-found: warn
          retention-days: 7

  linux-installer:
    name: fresh Linux installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install from a minimal Ubuntu image
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm --platform linux/amd64 \
            -v "$GITHUB_WORKSPACE:/work:ro" \
            -w /tmp \
            ubuntu:22.04 \
            bash -c '
              set -euo pipefail
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ca-certificates curl sudo >/dev/null
              test ! -e /usr/include/linux/input.h
              useradd --create-home --shell /bin/bash holo
              printf "holo ALL=(ALL) NOPASSWD:ALL\n" >/etc/sudoers.d/holo
              sudo -u holo env \
                HOME=/home/holo \
                HOLO_HOME=/home/holo/.holo-install \
                HOLO_INSTALL_MANIFEST_URL=file:///work/install/manifest.json \
                HOLO_INSTALL_PACKAGE=/work \
                HOLO_INSTALL_SKIP_PATH=1 \
                bash -c "
                  set -euo pipefail
                  cd /tmp
                  curl -fsSL file:///work/install/install.sh | bash
                  \"\$HOLO_HOME/bin/holo\" --help >/dev/null
                  test -x \"\$HOME/.holo/runtime/0.1.9/hai-agent-runtime\"
                "
              test -e /usr/include/linux/input.h
            '

  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, windows-11-arm]
    runs-on: ${{ matrix.os }}
    env:
      # Backstop for sub-calls that print before main() reconfigures stdout (cp1252 otherwise).
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Prepare OpenSSL for native Python dependencies
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vcpkg = $env:VCPKG_INSTALLATION_ROOT
          & "$vcpkg\vcpkg.exe" install openssl:arm64-windows-static-md
          if ($LASTEXITCODE -ne 0) {
            throw "vcpkg failed to install OpenSSL for Windows ARM64"
          }
          "VCPKG_ROOT=$vcpkg" >> $env:GITHUB_ENV
          "OPENSSL_DIR=$vcpkg\installed\arm64-windows-static-md" >> $env:GITHUB_ENV
          "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
      - run: uv sync --all-groups
      - name: ruff (lint)
        run: uv run ruff check .
      - name: ruff (format)
        run: uv run ruff format --check .
      - name: mypy
        if: matrix.os == 'ubuntu-latest'
        run: uv run mypy src/
      - name: pytest
        run: uv run pytest --cov --cov-report=xml
      - name: upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: examples
        if: matrix.os == 'ubuntu-latest'
        run: scripts/ci_examples.sh
      - name: smoke imports + CLI
        run: |
          uv run python -c "import holo_desktop; import holo_desktop.cli.mcp; import holo_desktop.cli.serve; import holo_desktop.cli.acp; import holo_desktop.cli.hosts; import holo_desktop.cli; import holo_desktop.agent_client; from holo_desktop import __version__; print(__version__)"
          uv run holo install list
          uv run holo install cursor
